<div class="app-container">
  <app-header [currentView]="currentView" (viewChange)="setView($event)"></app-header>

  <div class="main-layout">
    <app-sidebar [databaseData]="databaseData" [currentDatabase]="currentDatabase" [currentTable]="currentTable"
      [open]="sidebarOpen" (tableSelect)="onTableSelect($event)" (closeSidebar)="sidebarOpen = false"
      (toggleSidebar)="sidebarOpen = !sidebarOpen">
    </app-sidebar>

    <main class="main-content">
      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <span class="breadcrumb-item">Server: <a href="#" class="breadcrumb-link">localhost</a></span>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <span class="breadcrumb-item">Database: <a href="#" class="breadcrumb-link">{{ currentDatabase }}</a></span>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <span class="breadcrumb-item">Table: <a href="#" class="breadcrumb-link">{{ currentTable }}</a></span>
      </nav>

      <!-- Tabs -->
      <div class="tabs-container">
        <div class="tabs" role="tablist">
          <button class="tab" role="tab" [class.active]="currentView === 'data'"
            [attr.aria-selected]="currentView === 'data'" (click)="setView('data')">Data</button>
          <button class="tab" role="tab" [class.active]="currentView === 'structure'"
            [attr.aria-selected]="currentView === 'structure'" (click)="setView('structure')">Structure</button>
        </div>
      </div>

      <app-table [id]="currentId" [currentTable]="currentTable" [view]="currentView" [structure]="currentStructure" [data]="currentData"
        (structureChange)="onStructureChange($event)" (dataChange)="onDataChange($event)" (toast)="onToast($event)">
      </app-table>
    </main>
  </div>
</div>

<!-- Toast Notifications -->
<div class="toast-container">
  <div class="toast" *ngFor="let toast of toasts" [ngClass]="'toast-' + toast.type">
    <svg *ngIf="toast.type === 'success'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
    <svg *ngIf="toast.type === 'error'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="15" y1="9" x2="9" y2="15"></line>
      <line x1="9" y1="9" x2="15" y2="15"></line>
    </svg>
    <svg *ngIf="toast.type === 'warning'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
      <line x1="12" y1="9" x2="12" y2="13"></line>
      <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>
    <svg *ngIf="toast.type === 'info'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#60a5fa"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="16" x2="12" y2="12"></line>
      <line x1="12" y1="8" x2="12.01" y2="8"></line>
    </svg>
    <span>{{ toast.message }}</span>
  </div>
</div>
