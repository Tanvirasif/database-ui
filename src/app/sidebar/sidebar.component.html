<aside class="sidebar" [class.open]="open">
  <div class="sidebar-header">
    <span class="database-label">DATABASES</span>
  </div>

  <nav class="sidebar-nav">
    <div *ngFor="let dbName of databases" class="db-group">
      
      <!-- Database Header -->
      <button 
        class="db-header" 
        [class.active]="dbName === currentDatabase"
        (click)="toggleDatabase(dbName)">
        
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
          <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
        </svg>
        
        <span class="db-name">{{ dbName }}</span>
        
        <svg 
          class="chevron" 
          [class.rotated]="isExpanded(dbName)"
          width="14" 
          height="14" 
          viewBox="0 0 24 24" 
          fill="none" 
          stroke="currentColor" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <!-- Tables list -->
      <div 
        class="db-tables" 
        [class.expanded]="isExpanded(dbName)">
        
        <button 
          *ngFor="let item of getTables(dbName)"
          class="sidebar-item table-item" 
           [class.active]="item.table_name === currentTable && dbName === currentDatabase"
         (click)="selectTable(dbName, item.table_name, item.id)">
          
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
          
           <span>{{ item.table_name }}</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-footer-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.24 4.24l-4.24-4.24M6.34 6.34L2.1 2.1"></path>
      </svg>
      <span>Settings</span>
    </button>
    <button class="sidebar-footer-btn" title="Console">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 4 5"></polyline>
        <line x1="12" y1="19" x2="20" y2="19"></line>
      </svg>
      <span>Console</span>
    </button>
  </div>
</aside>

<button class="sidebar-toggle" aria-label="Toggle sidebar" (click)="onToggle()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="12" x2="21" y2="12"></line>
    <line x1="3" y1="6" x2="21" y2="6"></line>
    <line x1="3" y1="18" x2="21" y2="18"></line>
  </svg>
</button>

<div class="sidebar-overlay" [class.active]="open" (click)="onClose()"></div>
